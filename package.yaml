name: lfudacaching
version: 0.1.0.0
github: "philippedev101/lfudacache"
license: Apache-2.0
author: "philippedev101"
maintainer: "philippedev101@gmail.com"
copyright: "2026"
synopsis: Pure LFUDA, GDSF, and LFU cache implementations
description: LFUDA (Least Frequently Used with Dynamic Aging) cache implementation in Haskell
category: Data
extra-source-files:
  - README.md
  - CHANGELOG.md

language: GHC2021

default-extensions:
- NoImplicitPrelude

ghc-options:
- -Weverything
- -Wno-prepositive-qualified-module
- -Wno-missing-safe-haskell-mode
- -Wno-missing-import-lists
- -Wno-unsafe
- -Wno-all-missed-specialisations
- -Wno-missed-specialisations
- -Werror=identities
- -Werror=missing-methods
- -Werror=incomplete-record-updates
- -Werror=incomplete-patterns
- -Werror=missing-fields
- -Werror=ambiguous-fields
- -Werror=incomplete-uni-patterns
- -Werror=partial-fields
- -Werror=redundant-constraints

dependencies:
  - base >= 4.19 && < 5

library:
  source-dirs: src
  exposed-modules:
    - Data.LfudaCache
  dependencies:
    - deepseq >= 1.5 && < 1.7
    - hashable >= 1.4 && < 1.6
    - psqueues >= 0.2.8 && < 0.3
    - ghc-prim >= 0.11 && < 0.13

executables:
  lfuda-demo:
    main: Main.hs
    source-dirs: app
    dependencies:
      - lfudacaching

tests:
  lfuda-test:
    main: Main.hs
    source-dirs: test
    dependencies:
      - lfudacaching
      - tasty >= 1.5 && < 1.6
      - tasty-hunit >= 0.10 && < 0.11
    other-modules:
      - Test.Data.LfudaCache

benchmarks:
  lfuda-bench:
    main: Main.hs
    source-dirs: bench
    ghc-options:
      - -O2
      - -rtsopts
    dependencies:
      - lfudacaching
      - tasty-bench >= 0.4 && < 0.5
