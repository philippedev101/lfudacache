name: lfudacaching
version: 0.1.0.0
github: "philippedev101/lfudacache"
license: Apache-2.0
author: "philippedev101"
maintainer: "philippedev101@gmail.com"
copyright: "2026"
synopsis: Pure LFUDA, GDSF, and LFU cache implementations
description: LFUDA (Least Frequently Used with Dynamic Aging) cache implementation in Haskell
category: Data
extra-source-files:
  - README.md
  - CHANGELOG.md

language: GHC2021

default-extensions:
# Beyond GHC2021
- BangPatterns
- DataKinds
- DefaultSignatures
- DeriveAnyClass
- DeriveDataTypeable
- DeriveFoldable
- DeriveFunctor
- DeriveGeneric
- DeriveTraversable
- DerivingVia
- DisambiguateRecordFields
- DuplicateRecordFields
- FunctionalDependencies
- GADTs
- KindSignatures
- LambdaCase
- MultiWayIf
- NoImplicitPrelude
- OverloadedRecordDot
- OverloadedStrings
- PartialTypeSignatures
- PolyKinds
- RecordWildCards
- RoleAnnotations
- UnboxedSums
- UnboxedTuples
- UnliftedDatatypes
- UnliftedNewtypes
- ViewPatterns

_dev-ghc-options: &dev-ghc-options
- -Weverything

# Unavoidable noise — must suppress
- -Wno-missing-import-lists
- -Wno-missing-safe-haskell-mode
- -Wno-prepositive-qualified-module
- -Wno-safe
- -Wno-unsafe

# Errors
- -Werror=deprecations
- -Werror=identities
- -Werror=incomplete-patterns
- -Werror=incomplete-record-updates
- -Werror=missing-fields
- -Werror=missing-methods
- -Werror=ambiguous-fields
- -Werror=missing-export-lists
- -Werror=missing-local-signatures
- -Werror=monomorphism-restriction
- -Werror=type-defaults
- -Werror=orphans
- -Werror=unused-imports
- -Werror=name-shadowing
- -Werror=missing-kind-signatures
- -Werror=missing-deriving-strategies
- -Werror=unticked-promoted-constructors
- -Werror=missing-role-annotations
- -Wno-all-missed-specialisations
- -Wno-missed-specialisations

dependencies:
  - base >= 4.19 && < 5

library:
  source-dirs: src
  exposed-modules:
    - Data.LfudaCache
  ghc-options:
    - -Wall
  dependencies:
    - deepseq >= 1.5 && < 1.7
    - hashable >= 1.4 && < 1.6
    - psqueues >= 0.2.8 && < 0.3
    - ghc-prim >= 0.11 && < 0.13

executables:
  lfuda-demo:
    main: Main.hs
    source-dirs: app
    ghc-options: *dev-ghc-options
    dependencies:
      - lfudacaching

tests:
  lfuda-test:
    main: Main.hs
    source-dirs: test
    ghc-options: *dev-ghc-options
    dependencies:
      - lfudacaching
      - tasty >= 1.5 && < 1.6
      - tasty-hunit >= 0.10 && < 0.11
    other-modules:
      - Test.Data.LfudaCache

benchmarks:
  lfuda-bench:
    main: Main.hs
    source-dirs: bench
    ghc-options:
      - -O2
      - -rtsopts
    dependencies:
      - lfudacaching
      - tasty-bench >= 0.4 && < 0.5
